services:
  - type: web
    name: jamarik-website
    runtime: python
    runtimeVersion: 3.12
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 60
    
    envVars:
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: production
      
      # SECRET_KEY - MUST BE SET IN RENDER DASHBOARD
      - key: SECRET_KEY
        sync: false
      
      # DATABASE - Auto-generated by Render PostgreSQL
      - key: DATABASE_URL
        fromDatabase:
          name: jamarik_db
          property: connectionString
      
      # EMAIL CONFIG - MUST BE SET IN RENDER DASHBOARD
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: noreply@jamarik.com
      - key: CONTACT_EMAIL
        value: info@jamarik.com

databases:
  - name: jamarik_db
    plan: free
    region: virginia
    initializer: |
      python manage.py migrate
